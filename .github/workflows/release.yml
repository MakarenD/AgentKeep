name: AgentKeep

on:
  pull_request:
  push:
    branches:
      - main
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      release_tag:
        description: "Optional release tag to publish, for example v0.1.0. Leave empty to build artifacts only."
        required: false
        type: string

permissions:
  contents: write

jobs:
  test:
    name: Test
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Run tests
        run: swift test

  package:
    name: Package macOS app
    runs-on: macos-14
    needs: test
    if: github.event_name == 'workflow_dispatch' || github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    env:
      RELEASE_TAG_INPUT: ${{ inputs.release_tag }}
      IS_RELEASE_BUILD: ${{ startsWith(github.ref, 'refs/tags/v') || (github.event_name == 'workflow_dispatch' && inputs.release_tag != '') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Show Swift version
        run: swift --version

      - name: Import Apple Developer ID certificate
        if: env.IS_RELEASE_BUILD == 'true'
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          CODE_SIGN_IDENTITY: ${{ secrets.CODE_SIGN_IDENTITY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          REQUIRE_NOTARIZATION: "1"
        run: source scripts/ci-import-codesign-cert.sh

      - name: Build DMG and ZIP
        env:
          APPLE_APP_SPECIFIC_PASSWORD: ${{ secrets.APPLE_APP_SPECIFIC_PASSWORD }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail

          if [[ "$IS_RELEASE_BUILD" == "true" ]]; then
            export REQUIRE_NOTARIZATION=1

            if [[ -n "${RELEASE_TAG_INPUT:-}" ]]; then
              export VERSION="${RELEASE_TAG_INPUT#v}"
            fi
          fi

          ./scripts/package-release.sh

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: AgentKeep-macOS-${{ github.run_number }}
          path: .build/release-artifacts/*
          if-no-files-found: error

      - name: Explain release publishing
        if: env.IS_RELEASE_BUILD != 'true'
        run: |
          echo "This run built downloadable artifacts only."
          echo "GitHub Release publishing runs for tags like v0.1.0, or for a manual workflow_dispatch run with release_tag set."

      - name: Publish GitHub Release
        if: env.IS_RELEASE_BUILD == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          tag="${RELEASE_TAG_INPUT:-$GITHUB_REF_NAME}"
          title="AgentKeep $tag"
          notes="macOS release for AgentKeep $tag. Download the DMG, drag AgentKeep.app to Applications, and open it once."

          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" .build/release-artifacts/* --clobber
          else
            gh release create "$tag" .build/release-artifacts/* --title "$title" --notes "$notes" --target "$GITHUB_SHA"
          fi
